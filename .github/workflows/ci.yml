name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy --strict src

      - name: Test
        run: uv run pytest -q

      - name: Verify lifecycle fault matrix
        run: uv run python scripts/fault_inject_workers.py --platform current

      - name: Verify project identity
        run: uv run python scripts/verify_project_identity.py

      - name: Check import boundaries
        run: |
          for layer in domain application engine ledger policy evidence evaluation adapters cli; do
            uv run python scripts/check_import_boundaries.py "$layer"
          done
